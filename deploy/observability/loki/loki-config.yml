# 单节点 Loki（本机学习 / 开发用）
# 对齐官方 loki-local-config，并开启约 14 天保留（与 apps/back LOG_MAX_FILES 对齐）

# 本机开发关闭多租户鉴权；生产应开启并配置 X-Scope-OrgID
auth_enabled: false

server:
  # HTTP API / 推送 / 查询端口（compose 映射到宿主机 3100）
  http_listen_port: 3100
  grpc_listen_port: 9096

# 单二进制模式下的公共存储与环配置
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      # chunks：日志块；rules：告警规则（本机可空）
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  # 单副本，适合本机；集群需 >1 并配共享存储
  replication_factor: 1
  ring:
    kvstore:
      # 单机用内存环即可
      store: inmemory

# 索引 schema：tsdb + 本地 filesystem（Loki 3.x 推荐）
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        # 索引按天分片
        period: 24h

limits_config:
  # 与 apps/back LOG_MAX_FILES=14d 对齐（14 * 24h）
  retention_period: 336h
  allow_structured_metadata: true
  # 拒绝过旧样本，防止乱序时间戳打爆存储
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # 本机摄入限速（MB/s），防刷日志打满磁盘
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  volume_enabled: true

# 压缩与按保留策略删除旧数据（retention_enabled 必须为 true 才删）
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# 本机未部署 Alertmanager，仅占位；告警可后续接 Sentry / 钉钉等
ruler:
  alertmanager_url: http://localhost:9093

# 关闭向 Grafana Labs 上报匿名用量统计
analytics:
  reporting_enabled: false
